<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>openMotor Web</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, sans-serif; background: #020617; color: #e5e7eb; }
    button, select, input { font: inherit; }
    button { background: #2563eb; color: #fff; border: 0; border-radius: 8px; padding: 10px 12px; cursor: pointer; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    input, select { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e5e7eb; }
    .topbar { display: flex; justify-content: space-between; align-items: start; gap: 16px; padding: 18px 20px; border-bottom: 1px solid #1e293b; background: #0b1220; position: sticky; top: 0; z-index: 2; }
    .topbar h1 { margin: 0 0 4px; }
    .content { display: grid; grid-template-columns: 420px 1fr; min-height: calc(100vh - 88px); }
    .sidebar { padding: 16px; background: #0f172a; border-right: 1px solid #1e293b; overflow: auto; }
    .main { padding: 20px; overflow: auto; }
    .panel { background: #111827; border: 1px solid #1f2937; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
    .panel h2, .panel h3, .panel h4 { margin-top: 0; }
    .muted { color: #94a3b8; }
    .row { display: flex; gap: 8px; margin-top: 10px; }
    .wrap { flex-wrap: wrap; }
    .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .field { display: flex; flex-direction: column; gap: 6px; font-size: 13px; }
    .grain-list { display: flex; flex-direction: column; gap: 8px; }
    .grain-item { text-align: left; background: #1e293b; }
    .grain-item.active { background: #2563eb; }
    .stats-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 12px; margin-bottom: 16px; }
    .stat { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 14px; display: flex; flex-direction: column; gap: 6px; }
    .stat span { color: #94a3b8; font-size: 12px; }
    .stat strong { font-size: 18px; }
    .alerts { margin: 0; padding-left: 18px; }
    .results-layout { display: grid; grid-template-columns: 1.2fr 1fr; gap: 16px; }
    .chart-wrap { margin-bottom: 18px; }
    .chart { width: 100%; height: auto; background: #020617; border-radius: 10px; border: 1px solid #1e293b; }
    .error, .json-preview { white-space: pre-wrap; border-radius: 10px; padding: 12px; overflow: auto; }
    .error { background: #220a0a; color: #fecaca; }
    .json-preview { background: #020617; border: 1px solid #1e293b; max-height: 360px; }
    @media (max-width: 1200px) { .content { grid-template-columns: 1fr; } .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } .results-layout { grid-template-columns: 1fr; } .fields { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/main.js"></script>
</body>
</html>
